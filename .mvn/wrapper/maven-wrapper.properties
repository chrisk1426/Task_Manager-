# maven-wrapper.properties
#
# Tells the mvnw script which Maven version to use and where to download it from.
# When ./mvnw is run for the first time, it reads this file and downloads the
# specified Maven distribution to ~/.m2/wrapper/dists/ before running the build.
# Subsequent runs use the cached version — no re-download needed.

# The Maven distribution to download. Points to the official Apache Maven 3.9.9
# binary zip on Maven Central. Change this URL to upgrade Maven for the project.
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip

# The Maven Wrapper jar itself. Downloaded on first run if not present locally.
# This jar is the bootstrap class that handles downloading and caching Maven.
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar
