# =============================================================================
# Task Manager — application.properties
#
# Spring Boot reads this file at startup and applies all settings before
# any beans are created. Properties here configure the database, JPA
# behaviour, and JSON serialization globally across the entire application.
# =============================================================================


# -----------------------------------------------------------------------------
# H2 In-Memory Database Connection
#
# jdbc:h2:mem:taskdb — connects to an in-memory H2 database named "taskdb".
# "mem" means the database lives entirely in the JVM heap — no files are
# written to disk and all data is lost when the application stops.
# This is intentional for a development/demo project: no cleanup required
# between runs.
#
# sa / (empty password) are H2's default credentials. Spring Boot will use
# these to open the connection and also to authenticate the H2 console.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# -----------------------------------------------------------------------------
# Hibernate SQL Dialect
#
# Tells Hibernate which database-specific SQL syntax to use when generating
# queries (e.g., auto-increment syntax, string functions, pagination clauses).
# Hibernate can auto-detect this from the JDBC URL, but declaring it
# explicitly prevents any ambiguity and makes the intent clear.
# -----------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# -----------------------------------------------------------------------------
# H2 Browser Console
#
# Enables a web-based SQL interface at http://localhost:8080/h2-console.
# Reviewers can log in with the credentials above (username: sa, password: "")
# and run SQL queries directly against the live in-memory database to verify
# that tasks are being created, updated, and deleted correctly.
#
# This should be disabled in a production environment — it is enabled here
# purely for development and review convenience.
# -----------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# -----------------------------------------------------------------------------
# JPA Schema Generation
#
# create-drop: Hibernate creates all tables on startup (derived from @Entity
# classes) and drops them on shutdown. This guarantees a fresh, clean schema
# on every run — no stale tables or leftover data from previous runs.
#
# Other common values for reference:
#   update      — adds missing columns but never drops (safe for production)
#   validate    — checks schema matches entities but makes no changes
#   none        — does nothing (used when migrations handle schema separately)
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop


# -----------------------------------------------------------------------------
# Jackson Date Serialization
#
# By default, Jackson serializes Java date/time types (e.g., LocalDate) as
# numeric arrays: [2025, 4, 4]. This is unreadable and hard for clients to
# parse. Setting this to false instructs Jackson to use ISO 8601 string
# format instead: "2025-04-04".
#
# This applies globally to every endpoint that returns a date field,
# including Task.dueDate and TaskSuggestion.dueDate.
# -----------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false


# -----------------------------------------------------------------------------
# Anthropic API Key
#
# Used by AiService to authenticate requests to the Claude API for the
# POST /tasks/suggest endpoint.
#
# Set your key here to avoid exporting it as an environment variable each
# session. If left blank, the CRUD endpoints still work but /tasks/suggest
# returns 503 Service Unavailable.
#
# WARNING: do not commit this file to a public repository with a real key
# present — treat API keys as secrets.
# -----------------------------------------------------------------------------
ANTHROPIC_API_KEY=
